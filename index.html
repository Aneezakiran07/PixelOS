<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelOS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="desktop">

    <div id="desktop-icons">

      <div class="desk-icon" ondblclick="openFileExplorer()">
        <img src="assets/icon-files.svg" alt="Files" class="icon-img" />
        <span>Files</span>
      </div>

      <div class="desk-icon" ondblclick="openEditor(null)">
        <img src="assets/icon-editor.svg" alt="Editor" class="icon-img" />
        <span>Editor</span>
      </div>

      <div class="desk-icon">
        <img src="assets/icon-browser.svg" alt="Browser" class="icon-img" />
        <span>Browser</span>
      </div>

    </div>

    <div class="window" id="window-files">
      <div class="win-titlebar" onmousedown="startDrag(event, 'window-files')">
        <img src="assets/titleicon-files.svg" alt="" class="title-icon" />
        <span class="win-title">File Explorer</span>
        <div class="win-controls">
          <button class="win-btn btn-min" onclick="minimizeWindow('window-files')">_</button>
          <button class="win-btn btn-close" onclick="closeWindow('window-files')">x</button>
        </div>
      </div>
      <div class="win-body">
        <div class="fe-toolbar">
          <button class="fe-btn" id="btn-back" onclick="goBack()">Back</button>
          <button class="fe-btn" onclick="goUp()">Up</button>
          <input class="fe-path" id="fe-path" readonly />
        </div>
        <div class="fe-content" id="fe-content"></div>
        <div class="fe-statusbar" id="fe-statusbar">0 items</div>
      </div>
    </div>

    <div class="window" id="window-editor">
      <div class="win-titlebar" onmousedown="startDrag(event, 'window-editor')">
        <img src="assets/titleicon-editor.svg" alt="" class="title-icon" />
        <span class="win-title" id="editor-title">Text Editor</span>
        <div class="win-controls">
          <button class="win-btn btn-min" onclick="minimizeWindow('window-editor')">_</button>
          <button class="win-btn btn-close" onclick="closeWindow('window-editor')">x</button>
        </div>
      </div>
      <div class="win-body">

        <div class="te-toolbar">
          <button class="te-btn" onclick="teNew()">New</button>
          <button class="te-btn" onclick="teSave()">Save</button>
          <button class="te-btn" onclick="teClear()">Clear</button>
        </div>

        <textarea class="te-area" id="te-area" spellcheck="false"
          placeholder="start typing..."></textarea>

        <div class="te-statusbar">
          <span id="te-words">0 words</span>
          <span id="te-chars">0 chars</span>
          <span id="te-filename">untitled.txt</span>
        </div>

      </div>
    </div>

    <div id="toast" class="toast"></div>

  </div>

  <div id="taskbar">

    <button id="start-btn">
      <img src="assets/start-btn-icon.svg" alt="" class="start-btn-icon" />
    </button>

    <button class="tb-app" id="tb-files" onclick="openFileExplorer()">
      <img src="assets/icon-files.svg" alt="" class="tb-icon" />
    </button>

    <button class="tb-app" id="tb-editor" onclick="openEditor(null)">
      <img src="assets/icon-editor.svg" alt="" class="tb-icon" />
    </button>

    <button class="tb-app">
      <img src="assets/icon-browser.svg" alt="" class="tb-icon" />
    </button>

    <div id="clock">00:00</div>

  </div>

  <script src="script.js"></script>
</body>
</html>

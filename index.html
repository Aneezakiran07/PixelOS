<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelOS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="desktop">

    <div id="desktop-icons">

      <div class="desk-icon" ondblclick="openFileExplorer()">
        <img src="assets/icon-files.svg" alt="Files" class="icon-img" />
        <span>Files</span>
      </div>

      <div class="desk-icon" ondblclick="openEditor(null)">
        <img src="assets/icon-editor.svg" alt="Editor" class="icon-img" />
        <span>Editor</span>
      </div>

      <div class="desk-icon" ondblclick="openBrowser()">
        <img src="assets/icon-browser.svg" alt="Browser" class="icon-img" />
        <span>Browser</span>
      </div>

    </div>

    <div class="window" id="window-files">
      <div class="win-titlebar" onmousedown="startDrag(event, 'window-files')">
        <img src="assets/titleicon-files.svg" alt="" class="title-icon" />
        <span class="win-title">File Explorer</span>
        <div class="win-controls">
          <button class="win-btn btn-min" onclick="minimizeWindow('window-files')">_</button>
          <button class="win-btn btn-close" onclick="closeWindow('window-files')">x</button>
        </div>
      </div>
      <div class="win-body">
        <div class="fe-toolbar">
          <button class="fe-btn" id="btn-back" onclick="goBack()">Back</button>
          <button class="fe-btn" onclick="goUp()">Up</button>
          <input class="fe-path" id="fe-path" readonly />
        </div>
        <div class="fe-content" id="fe-content"></div>
        <div class="fe-statusbar" id="fe-statusbar">0 items</div>
      </div>
    </div>

    <div class="window" id="window-editor">
      <div class="win-titlebar" onmousedown="startDrag(event, 'window-editor')">
        <img src="assets/titleicon-editor.svg" alt="" class="title-icon" />
        <span class="win-title" id="editor-title">Text Editor</span>
        <div class="win-controls">
          <button class="win-btn btn-min" onclick="minimizeWindow('window-editor')">_</button>
          <button class="win-btn btn-close" onclick="closeWindow('window-editor')">x</button>
        </div>
      </div>
      <div class="win-body">
        <div class="te-toolbar">
          <button class="te-btn" onclick="teNew()">New</button>
          <button class="te-btn" onclick="teSave()">Save</button>
          <button class="te-btn" onclick="teClear()">Clear</button>
        </div>
        <textarea class="te-area" id="te-area" spellcheck="false"
          placeholder="start typing..."></textarea>
        <div class="te-statusbar">
          <span id="te-words">0 words</span>
          <span id="te-chars">0 chars</span>
          <span id="te-filename">untitled.txt</span>
        </div>
      </div>
    </div>

    <div class="window" id="window-browser">
      <div class="win-titlebar" onmousedown="startDrag(event, 'window-browser')">
        <img src="assets/titleicon-browser.svg" alt="" class="title-icon" />
        <span class="win-title" id="browser-title">PixelBrowser</span>
        <div class="win-controls">
          <button class="win-btn btn-min" onclick="minimizeWindow('window-browser')">_</button>
          <button class="win-btn btn-close" onclick="closeWindow('window-browser')">x</button>
        </div>
      </div>
      <div class="win-body">

        <div class="br-toolbar">
          <button class="br-btn" id="br-back-btn" onclick="brBack()">Back</button>
          <button class="br-btn" id="br-fwd-btn" onclick="brForward()">Fwd</button>
          <input class="br-url" id="br-url"
            onkeydown="if(event.key==='Enter') brNavigate()" />
          <button class="br-btn" onclick="brNavigate()">Go</button>
        </div>

        <div class="br-content" id="br-content"></div>

        <div class="br-statusbar" id="br-statusbar">pixel://home</div>

      </div>
    </div>

    <div id="toast" class="toast"></div>

    <div id="start-menu">
      <div class="start-menu-header">
        <img src="assets/start-logo.svg" alt="" class="start-menu-logo" />
        <div class="start-menu-header-text">
          <span class="start-menu-user">PixelOS</span>
          <span class="start-menu-os">PixelOS 1.0</span>
        </div>
      </div>

      <div class="start-menu-body">

        <div class="start-menu-col">
          <p class="start-col-label">Apps</p>
          <div class="start-item" onclick="openFileExplorer(); closeStartMenu()">
            <img src="assets/icon-files.svg" alt="" class="start-item-icon" />
            <span>File Explorer</span>
          </div>
          <div class="start-item" onclick="openEditor(null); closeStartMenu()">
            <img src="assets/icon-editor.svg" alt="" class="start-item-icon" />
            <span>Text Editor</span>
          </div>
          <div class="start-item" onclick="openBrowser(); closeStartMenu()">
            <img src="assets/icon-browser.svg" alt="" class="start-item-icon" />
            <span>PixelBrowser</span>
          </div>
        </div>

      </div>

      <div class="start-menu-footer">
        <div class="start-footer-btn" onclick="showToast('Shutting down... ✿'); closeStartMenu()">
          ⏻ Shut Down
        </div>
        <div class="start-footer-btn" onclick="showToast('Restarting... ✿'); closeStartMenu()">
          ↺ Restart
        </div>
      </div>

    </div>

  </div>

  <div id="taskbar">

    <button id="start-btn" onclick="toggleStartMenu()">
      <img src="assets/start-btn-icon.svg" alt="" class="start-btn-icon" />
    </button>

    <button class="tb-app" id="tb-files" onclick="toggleWin('window-files', 'tb-files')">
      <img src="assets/icon-files.svg" alt="" class="tb-icon" />
      <div class="tb-app-dot"></div>
      <div class="tb-preview">
        <div class="tb-preview-title">
          <span>File Explorer</span>
          <div class="tb-preview-close" onclick="event.stopPropagation(); closeWindow('window-files')">x</div>
        </div>
        <div class="tb-preview-body" id="prev-files">Not open</div>
      </div>
    </button>

    <button class="tb-app" id="tb-editor" onclick="toggleWin('window-editor', 'tb-editor')">
      <img src="assets/icon-editor.svg" alt="" class="tb-icon" />
      <div class="tb-app-dot"></div>
      <div class="tb-preview">
        <div class="tb-preview-title">
          <span id="prev-editor-title">Text Editor</span>
          <div class="tb-preview-close" onclick="event.stopPropagation(); closeWindow('window-editor')">x</div>
        </div>
        <div class="tb-preview-body" id="prev-editor">Not open</div>
      </div>
    </button>

    <button class="tb-app" id="tb-browser" onclick="toggleWin('window-browser', 'tb-browser')">
      <img src="assets/icon-browser.svg" alt="" class="tb-icon" />
      <div class="tb-app-dot"></div>
      <div class="tb-preview">
        <div class="tb-preview-title">
          <span>PixelBrowser</span>
          <div class="tb-preview-close" onclick="event.stopPropagation(); closeWindow('window-browser')">x</div>
        </div>
        <div class="tb-preview-body" id="prev-browser">Not open</div>
      </div>
    </button>

    <div id="clock">00:00</div>

  </div>

  <script src="script.js"></script>
</body>
</html>

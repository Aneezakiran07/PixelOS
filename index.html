<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelOS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="desktop">
    <div id="desktop-icons">

      <div class="desk-icon">
        <img src="assets/icon-files.svg" alt="Files" class="icon-img" />
        <span>Files</span>
      </div>

      <div class="desk-icon">
        <img src="assets/icon-editor.svg" alt="Editor" class="icon-img" />
        <span>Editor</span>
      </div>

      <div class="desk-icon">
        <img src="assets/icon-browser.svg" alt="Browser" class="icon-img" />
        <span>Browser</span>
      </div>

    </div>

  </div>
  <div id="taskbar">

    <button id="start-btn">
      <img src="assets/start-btn-icon.svg" alt="" class="start-btn-icon" />
    </button>

    <button class="tb-app">
      <img src="assets/icon-files.svg" alt="" class="tb-icon" />
    </button>

    <button class="tb-app">
      <img src="assets/icon-editor.svg" alt="" class="tb-icon" />
    </button>

    <button class="tb-app">
      <img src="assets/icon-browser.svg" alt="" class="tb-icon" />
    </button>

    <div id="clock">00:00</div>

  </div>

  <script src="script.js"></script>
</body>
</html>
